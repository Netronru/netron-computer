<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="NTRN" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>NTRN</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" />
    <link rel="stylesheet" href="/static/mobile.css" />
    <script src="/static/mobile.js" defer></script>
  </head>
  <body class="mobile-shell">
    <div id="connectScreen" class="shell-screen active">
      <button id="settingsLauncher" class="shell-icon-button shell-settings-button" type="button" aria-label="Settings">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 8.8A3.2 3.2 0 1 0 12 15.2A3.2 3.2 0 1 0 12 8.8zM21 13.1v-2.2l-2-.6a7.9 7.9 0 0 0-.6-1.4l1-1.8l-1.6-1.6l-1.8 1a7.9 7.9 0 0 0-1.4-.6L13.1 3h-2.2l-.6 2a7.9 7.9 0 0 0-1.4.6l-1.8-1L5.5 6.2l1 1.8a7.9 7.9 0 0 0-.6 1.4L3.9 10.9v2.2l2 .6c.1.5.3 1 .6 1.4l-1 1.8l1.6 1.6l1.8-1c.4.3.9.5 1.4.6l.6 2h2.2l.6-2c.5-.1 1-.3 1.4-.6l1.8 1l1.6-1.6l-1-1.8c.3-.4.5-.9.6-1.4l2-.6z"></path>
        </svg>
      </button>
      <div class="connect-card">
        <div class="brand-mark">N</div>
        <h1 class="connect-title">NTRN</h1>
        <p id="connectCopy" class="connect-copy">Tap connect to find your computer on the local network.</p>
        <button id="connectButton" class="connect-button" type="button">Connect</button>
        <p id="connectStatus" class="connect-status" aria-live="polite"></p>
      </div>
    </div>

    <div id="loginSheet" class="auth-sheet hidden" aria-hidden="true">
      <form id="loginForm" class="auth-card">
        <h2 id="loginTitle">Sign in</h2>
        <label class="auth-label" for="loginUsername">Username</label>
        <input id="loginUsername" name="username" type="text" autocomplete="username" required />
        <label class="auth-label" for="loginPassword">Password</label>
        <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
        <div class="auth-actions">
          <button id="cancelLoginButton" class="secondary-button" type="button">Back</button>
          <button id="submitLoginButton" class="primary-button" type="submit">Open</button>
        </div>
        <p id="loginStatus" class="connect-status" aria-live="polite"></p>
      </form>
    </div>

    <div id="viewerScreen" class="viewer-screen hidden">
      <button id="viewerSettingsButton" class="shell-icon-button shell-settings-viewer" type="button" aria-label="Settings">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 8.8A3.2 3.2 0 1 0 12 15.2A3.2 3.2 0 1 0 12 8.8zM21 13.1v-2.2l-2-.6a7.9 7.9 0 0 0-.6-1.4l1-1.8l-1.6-1.6l-1.8 1a7.9 7.9 0 0 0-1.4-.6L13.1 3h-2.2l-.6 2a7.9 7.9 0 0 0-1.4.6l-1.8-1L5.5 6.2l1 1.8a7.9 7.9 0 0 0-.6 1.4L3.9 10.9v2.2l2 .6c.1.5.3 1 .6 1.4l-1 1.8l1.6 1.6l1.8-1c.4.3.9.5 1.4.6l.6 2h2.2l.6-2c.5-.1 1-.3 1.4-.6l1.8 1l1.6-1.6l-1-1.8c.3-.4.5-.9.6-1.4l2-.6z"></path>
        </svg>
      </button>
      <main id="mobileViewport" class="mobile-viewport" aria-label="Remote screen">
        <img id="mobileScreenImage" alt="Remote screen" draggable="false" />
        <textarea
          id="mobileKeyboardBridge"
          class="mobile-keyboard-bridge"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
        ></textarea>
        <audio id="mobileAudioPlayer" class="mobile-audio-player" playsinline></audio>
        <div id="mobileCursorDot" class="mobile-cursor-dot hidden" aria-hidden="true"></div>
        <div id="mobileOverlay" class="mobile-overlay">Connecting to the remote screen...</div>
      </main>
      <div id="displayDock" class="mobile-controls left hidden">
        <button id="displayButton" class="shell-icon-button dock-button" type="button" aria-label="Display">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 5h16a2 2 0 0 1 2 2v8.5a2 2 0 0 1-2 2H14.5l1.2 1.8V21h-7.4v-1.7l1.2-1.8H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2zm0 2v8.5h16V7H4z"></path>
          </svg>
        </button>
      </div>
      <div id="actionDock" class="mobile-controls right">
        <button id="soundIconButton" class="shell-icon-button dock-button" type="button" aria-label="Sound">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M13 5.5v13l-5-4H4V9.5h4l5-4zm3.4 3.1a5 5 0 0 1 0 6.8l-1.4-1.4a3 3 0 0 0 0-4l1.4-1.4zm2.8-2.8a9 9 0 0 1 0 12.4l-1.4-1.4a7 7 0 0 0 0-9.6l1.4-1.4z"></path>
          </svg>
        </button>
        <button id="keyboardIconButton" class="shell-icon-button dock-button" type="button" aria-label="Keyboard">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2zm0 2v8h16V8H4zm2 2h2v2H6v-2zm3 0h2v2H9v-2zm3 0h2v2h-2v-2zm3 0h2v2h-2v-2zm-9 3h8v2H6v-2zm9 0h3v2h-3v-2z"></path>
          </svg>
        </button>
      </div>
    </div>

    <div id="settingsSheet" class="settings-sheet hidden" aria-hidden="true">
      <div class="settings-card">
        <div class="settings-header">
          <h2 id="settingsTitle">Settings</h2>
          <button id="closeSettingsButton" class="shell-icon-button close-sheet-button" type="button" aria-label="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.4 5L12 10.6L17.6 5L19 6.4L13.4 12L19 17.6L17.6 19L12 13.4L6.4 19L5 17.6L10.6 12L5 6.4z"></path>
            </svg>
          </button>
        </div>
        <label class="settings-label" for="languageSelect">Language</label>
        <select id="languageSelect" class="settings-select">
          <option value="en">English</option>
          <option value="ru">Русский</option>
          <option value="es">Español</option>
        </select>
        <label class="settings-switch">
          <input id="autoSearchToggle" type="checkbox" checked />
          <span id="autoSearchLabel">Auto-search nearby ports</span>
        </label>
        <label class="settings-label" for="hostInput">Computer host</label>
        <input id="hostInput" class="settings-input" type="text" />
        <label class="settings-label" for="portInput">Starting port</label>
        <input id="portInput" class="settings-input" type="number" min="1" max="65535" />
      </div>
    </div>
  </body>
</html>
