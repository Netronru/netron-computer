<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>NTRN</title>
    <link rel="stylesheet" href="viewer.css" />
    <script src="viewer.js" defer></script>
  </head>
  <body class="viewer-shell">
    <main id="viewport" class="viewer-surface" aria-label="Remote screen">
      <div id="screenStage" class="screen-stage">
        <img id="screenImage" alt="Remote screen" draggable="false" />
      </div>
      <textarea
        id="keyboardBridge"
        class="keyboard-bridge"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
      ></textarea>
      <audio id="audioPlayer" class="audio-player" playsinline></audio>
      <div id="cursorDot" class="cursor-dot hidden" aria-hidden="true"></div>
      <div id="screenOverlay" class="screen-overlay">Connecting to the remote screen...</div>
    </main>

    <div id="displayDock" class="dock dock-left hidden">
      <button id="displayButton" class="dock-button" type="button" aria-label="Display">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 5h16a2 2 0 0 1 2 2v8.5a2 2 0 0 1-2 2H14.5l1.2 1.8V21h-7.4v-1.7l1.2-1.8H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2zm0 2v8.5h16V7H4z"></path>
        </svg>
      </button>
    </div>

    <div class="dock dock-right">
      <button id="soundButton" class="dock-button" type="button" aria-label="Sound">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M13 5.5v13l-5-4H4V9.5h4l5-4zm3.4 3.1a5 5 0 0 1 0 6.8l-1.4-1.4a3 3 0 0 0 0-4l1.4-1.4zm2.8-2.8a9 9 0 0 1 0 12.4l-1.4-1.4a7 7 0 0 0 0-9.6l1.4-1.4z"></path>
        </svg>
      </button>
      <button id="keyboardButton" class="dock-button" type="button" aria-label="Keyboard">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 6h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2zm0 2v8h16V8H4zm2 2h2v2H6v-2zm3 0h2v2H9v-2zm3 0h2v2h-2v-2zm3 0h2v2h-2v-2zm-9 3h8v2H6v-2zm9 0h3v2h-3v-2z"></path>
        </svg>
      </button>
    </div>
  </body>
</html>
